
name: reciperemixapi

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user1
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: recipe_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://user1:123456@db:5432/recipe_db
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  postgres_data:
